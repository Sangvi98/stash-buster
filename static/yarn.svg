<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" width="80" height="64">
  <!-- Back row (3 balls) -->

  <!-- Back-left ball (dusty rose) -->
  <circle cx="20" cy="22" r="12" fill="#d4899e"/>
  <circle cx="20" cy="22" r="12" fill="none" stroke="#b5597a" stroke-width="0.8"/>
  <ellipse cx="20" cy="22" rx="11" ry="5" fill="none" stroke="#b5597a" stroke-width="0.7" transform="rotate(-20,20,22)"/>
  <ellipse cx="20" cy="22" rx="10" ry="6" fill="none" stroke="#b5597a" stroke-width="0.7" transform="rotate(40,20,22)"/>

  <!-- Back-center ball (sage green) -->
  <circle cx="42" cy="20" r="13" fill="#a8c5a0"/>
  <circle cx="42" cy="20" r="13" fill="none" stroke="#7a9e72" stroke-width="0.8"/>
  <ellipse cx="42" cy="20" rx="12" ry="5.5" fill="none" stroke="#7a9e72" stroke-width="0.7" transform="rotate(-30,42,20)"/>
  <ellipse cx="42" cy="20" rx="11" ry="6.5" fill="none" stroke="#7a9e72" stroke-width="0.7" transform="rotate(35,42,20)"/>

  <!-- Back-right ball (lavender) -->
  <circle cx="62" cy="23" r="11" fill="#c5b8d6"/>
  <circle cx="62" cy="23" r="11" fill="none" stroke="#9e8db8" stroke-width="0.8"/>
  <ellipse cx="62" cy="23" rx="10" ry="4.5" fill="none" stroke="#9e8db8" stroke-width="0.7" transform="rotate(-25,62,23)"/>
  <ellipse cx="62" cy="23" rx="9" ry="5.5" fill="none" stroke="#9e8db8" stroke-width="0.7" transform="rotate(45,62,23)"/>

  <!-- Front row (3 balls, overlapping the back) -->

  <!-- Front-left ball (warm gold) -->
  <circle cx="14" cy="42" r="14" fill="#e8c8a0"/>
  <circle cx="14" cy="42" r="14" fill="none" stroke="#c4a67a" stroke-width="0.8"/>
  <ellipse cx="14" cy="42" rx="13" ry="5.5" fill="none" stroke="#c4a67a" stroke-width="0.7" transform="rotate(-20,14,42)"/>
  <ellipse cx="14" cy="42" rx="12" ry="7" fill="none" stroke="#c4a67a" stroke-width="0.7" transform="rotate(35,14,42)"/>
  <ellipse cx="14" cy="42" rx="11" ry="8" fill="none" stroke="#c4a67a" stroke-width="0.7" transform="rotate(75,14,42)"/>

  <!-- Front-center ball (soft coral) -->
  <circle cx="38" cy="44" r="13" fill="#e8a8a0"/>
  <circle cx="38" cy="44" r="13" fill="none" stroke="#c4807a" stroke-width="0.8"/>
  <ellipse cx="38" cy="44" rx="12" ry="5" fill="none" stroke="#c4807a" stroke-width="0.7" transform="rotate(-30,38,44)"/>
  <ellipse cx="38" cy="44" rx="11" ry="6.5" fill="none" stroke="#c4807a" stroke-width="0.7" transform="rotate(30,38,44)"/>
  <ellipse cx="38" cy="44" rx="10" ry="7.5" fill="none" stroke="#c4807a" stroke-width="0.7" transform="rotate(70,38,44)"/>

  <!-- Front-right ball (sky blue) -->
  <circle cx="60" cy="43" r="12" fill="#a0c8e0"/>
  <circle cx="60" cy="43" r="12" fill="none" stroke="#7aa8c4" stroke-width="0.8"/>
  <ellipse cx="60" cy="43" rx="11" ry="5" fill="none" stroke="#7aa8c4" stroke-width="0.7" transform="rotate(-25,60,43)"/>
  <ellipse cx="60" cy="43" rx="10" ry="6" fill="none" stroke="#7aa8c4" stroke-width="0.7" transform="rotate(40,60,43)"/>
  <ellipse cx="60" cy="43" rx="9" ry="7" fill="none" stroke="#7aa8c4" stroke-width="0.7" transform="rotate(80,60,43)"/>

  <!-- Loose yarn tails for charm -->
  <path d="M26 36 Q32 30 28 25" fill="none" stroke="#b5597a" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M50 38 Q54 32 50 27" fill="none" stroke="#7a9e72" stroke-width="1.3" stroke-linecap="round"/>
</svg>
