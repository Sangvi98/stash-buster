<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stash Buster{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="logo">
            <img src="{{ url_for('static', filename='yarn.svg') }}" alt="Yarn" class="logo-icon">
            Stash Buster
        </a>
        <div class="nav-links">
            {% if session.get('username') %}
                <a href="{{ url_for('stash') }}">My Stash</a>
                <a href="{{ url_for('suggestions_from_projects') }}">Project-Based Ideas</a>
                <a href="{{ url_for('logout') }}" class="btn-outline">Logout ({{ session.get('username', '') }})</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="btn-primary" style="padding: 0.4rem 1rem; font-size: 0.9rem;">Connect with Ravelry</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Stash Buster &middot; Powered by the <a href="https://www.ravelry.com" target="_blank">Ravelry</a> API</p>
    </footer>
</body>
</html>
